# ================================================
# 云效同步工具 - 配置文件模板
# ================================================
# 复制此文件为 config.yaml 并填入实际值
# 注意: config.yaml 包含敏感信息，请勿提交到版本库
# 功能: 用例同步 / 测试结果回写 / 缺陷创建
# ================================================

# 云效 API 连接配置
yunxiao:
  # 个人访问令牌 PAT（也可通过环境变量 YUNXIAO_PAT 设置）
  # 获取方式: 云效 -> 头像 -> 个人设置 -> 个人访问令牌 -> 新建
  # 权限: 需勾选「测试管理」和「项目协作」相关读写权限
  # 格式: pt-xxxx****xxxx
  personal_access_token: ""

  # 云效组织ID（也可通过环境变量 YUNXIAO_ORG_ID 设置）
  # 获取方式: 云效控制台 -> 设置 -> 组织信息 -> 组织ID
  organization_id: ""

  # Testhub 用例库ID（testRepo id）
  # 获取方式: 云效 -> 测试管理 -> 用例库 -> 用例库设置 -> 用例库ID
  # 首次使用时留空，按提示在控制台创建后填入
  space_identifier: ""

  # 用例库显示名称（仅用于提示信息）
  space_name: "剧权宝测试用例库"

  # 用例默认负责人用户ID（也可通过环境变量 YUNXIAO_ASSIGNED_TO 设置）
  # 获取方式: 云效 -> 设置 -> 成员管理 -> 点击用户查看 ID
  assigned_to: ""

  # API 域名（通常无需修改）
  domain: "openapi-rdc.aliyuncs.com"

# 同步行为配置
sync:
  # Markdown 用例目录（相对项目根目录的路径）
  md_case_dir: ".qoder/skills/测试用例库/剧权宝用例库/测试脚本_v2/md_case"

  # 同步模块过滤（留空则同步全部模块）
  # 可选值: login, intro, enterprise_cert, credits_center,
  #         team_management, account_settings, dashboard_overview
  modules: []

  # 模拟模式（true = 仅解析和映射，不调用 API）
  dry_run: false

  # 每批次处理数量（防 API 限流）
  batch_size: 10

  # API 失败重试次数
  retry_count: 3

  # 重试间隔（秒，实际等待时间随次数递增）
  retry_delay: 2

# 映射与状态持久化配置
mapping:
  # 同步状态文件路径（相对项目根目录）
  # 记录已同步的用例ID和目录映射，支持增量同步
  state_file: "tools/yunxiao/sync_state.json"

# 云效 Projex 缺陷配置（create_defect.py 使用）
projex:
  # 项目ID（Projex 项目协作空间的标识符，非 Testhub 用例库ID）
  # 获取方式: 通过 testPlan/list API 返回的 spaceIdentifier，
  #           或云效 -> 项目协作 -> 进入项目 -> 项目设置 -> 基本信息
  project_id: ""

  # 缺陷工作项类型ID
  # 获取方式: GET /projects/{projectId}/workitemTypes?category=Bug
  # 选择名称为"缺陷"的类型的 id 值
  workitem_type_id: ""

  # 缺陷默认指派人（留空则使用 yunxiao.assigned_to）
  default_assignee: ""

  # 关联迭代ID（可选，留空则不关联迭代）
  # 获取方式: GET /projects/{projectId}/sprints
  sprint_id: ""

  # 严重程度选项ID（必填，项目字段 seriousLevel 的选项值）
  # 获取方式: GET /projects/{projectId}/workitemTypes/{typeId}/fields
  #           找到 id=seriousLevel 的字段，从 options 中选取对应等级的 id
  severity_option_id: ""

  # 优先级选项ID（必填，项目字段 priority 的选项值）
  # 获取方式: 同上，找到 id=priority 的字段
  priority_option_id: ""
